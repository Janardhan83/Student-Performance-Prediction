<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Prediction</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f4f4;
            padding:40px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h1{
            text-align:center;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-top:8px;
            margin-bottom:15px;
        }

        button{
            width:100%;
            padding:12px;
            background:green;
            color:white;
            border:none;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:darkgreen;
        }

        .result{
            text-align:center;
            margin-top:20px;
            font-size:20px;
            color:blue;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Student Performance Predictor</h1>

    <form action="/predict" method="post">

        <label>Hours Studied</label>
        <input type="number" step="any" name="hours_studied" required>

        <label>Previous Scores</label>
        <input type="number" step="any" name="previous_scores" required>

        <label>Extracurricular Activities</label>
        <select name="extracurricular">
            <option value="1">Yes</option>
            <option value="0">No</option>
        </select>

        <label>Sleep Hours</label>
        <input type="number" step="any" name="sleep_hours" required>

        <label>Sample Question Papers Practiced</label>
        <input type="number" step="any" name="sample_papers" required>

        <button type="submit">Predict</button>

    </form>

    <div class="result">
        {{ prediction_text }}
    </div>

</div>

</body>
</html>
